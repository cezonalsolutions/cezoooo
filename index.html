<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow-x:hidden;
    overflow-y:auto;
    font-family:Arial,sans-serif;

    background:linear-gradient(
        135deg,
        #16a34a,
        #22c55e,
        #4ade80
    );
}

.main{
    min-height:100vh;
    padding-bottom:250px;
}

/* SPLASH */

.splash{
    position:fixed;
    inset:0;

    background:linear-gradient(
        135deg,
        #16a34a,
        #22c55e,
        #4ade80
    );

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:9999;

    transition:1s;
}

.logo-wrap{
    text-align:center;
}

.logo{
    display:flex;
    justify-content:center;
    gap:4px;
}

/* LETTER */

.letter{
    font-family:'Bungee', cursive;

    position:relative;

    font-size:58px;

    color:white;

    opacity:0;

    will-change:transform,opacity;

    animation:blast .5s ease-out forwards;
}

.letter:nth-child(1){
    animation-delay:0s;
}
.letter:nth-child(2){
    animation-delay:.25s;
}
.letter:nth-child(3){
    animation-delay:.5s;
}
.letter:nth-child(4){
    animation-delay:.75s;
}
.letter:nth-child(5){
    animation-delay:1s;
}

/* LETTER ENTRY */

@keyframes blast{

    0%{
        opacity:0;
        transform:translateY(30px) scale(.8);
    }

    100%{
        opacity:1;
        transform:translateY(0) scale(1);
    }

}

/* PARTICLES */

.p{
    position:absolute;

    left:50%;
    top:50%;

    color:white;

    font-size:12px;

    opacity:0;
}

/* PARTICLE TIMING */

.letter:nth-child(1) .p{
    animation:particle .9s .1s forwards;
}

.letter:nth-child(2) .p{
    animation:particle .9s .35s forwards;
}

.letter:nth-child(3) .p{
    animation:particle .9s .6s forwards;
}

.letter:nth-child(4) .p{
    animation:particle .9s .85s forwards;
}

.letter:nth-child(5) .p{
    animation:particle .9s 1.1s forwards;
}

/* DIRECTIONS */

.p1{ --x:-70px; --y:-50px; }
.p2{ --x:70px; --y:-50px; }
.p3{ --x:-80px; --y:0px; }
.p4{ --x:80px; --y:0px; }
.p5{ --x:-60px; --y:60px; }
.p6{ --x:60px; --y:60px; }
.p7{ --x:0px; --y:-80px; }
.p8{ --x:0px; --y:80px; }

@keyframes particle{

    0%{
        opacity:1;
        transform:
        translate(-50%,-50%)
        scale(0);
    }

    100%{
        opacity:0;

        transform:
        translate(
        calc(-50% + var(--x)),
        calc(-50% + var(--y))
        )
        scale(2.5)
        rotate(360deg);
    }

}

/* TAGLINE */
.tagline{

    margin-top:12px;

    color:white;

    font-size:15px;

    font-weight:700;

    letter-spacing:2px;

    opacity:0;

    transform:translateX(-120px);

    animation:slideTag .8s ease forwards;

    animation-delay:1.8s;
}

@keyframes slideTag{

    0%{
        opacity:0;
        transform:translateX(-120px);
    }

    70%{
        opacity:1;
        transform:translateX(10px);
    }

    100%{
        opacity:1;
        transform:translateX(0);
    }

}
/* LOGO POP */

.logo-wrap{
    animation:logoPop 1s ease forwards;
    animation-delay:2.2s;
}

@keyframes logoPop{

    50%{
        transform:scale(1.06);
    }

    100%{
        transform:scale(1);
    }

}

/* SPLASH OUT */

.hideSplash{

    opacity:0;

    transform:scale(1.15);

    pointer-events:none;

}

/* MAIN */

.main{

    min-height:100vh;

    background:linear-gradient(
        135deg,
        #16a34a,
        #22c55e,
        #4ade80
    );

    position:relative;
}
.navbar{

    position:fixed;

    top:15px;
    left:20px;
    right:20px;

    height:68px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 22px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(20px);

    border-radius:22px;

    border:1px solid rgba(255,255,255,.25);

    box-shadow:
    0 10px 30px rgba(0,0,0,.15);

    z-index:1000;
}
.bell{

    font-size:28px;

    color:white;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;

    transform-origin:top center;

    animation:bellSwing 3s ease-in-out infinite;
}

@keyframes bellSwing{

    0%,100%{
        transform:rotate(0deg);
    }

    25%{
        transform:rotate(-8deg);
    }

    50%{
        transform:rotate(0deg);
    }

    75%{
        transform:rotate(8deg);
    }
}

.bell.animate{

    animation:bellClick .8s ease;
}

@keyframes bellClick{

    0%{
        transform:scale(1) rotate(0deg);
    }

    15%{
        transform:scale(1.4) rotate(-20deg);
    }

    30%{
        transform:scale(1.4) rotate(20deg);
    }

    45%{
        transform:scale(1.3) rotate(-15deg);
    }

    60%{
        transform:scale(1.2) rotate(15deg);
    }

    100%{
        transform:scale(1) rotate(0deg);
    }
}
.logo-text{

    font-family:'Bungee', cursive;

    font-size:26px;

    color:#fff;

    letter-spacing:1px;

    line-height:1;

    display:flex;
    align-items:center;
}
.side-tab{

    position:fixed;

.lang-switch.show{

.lang-switch{

.lang-switch span{

}

.toggle{

    width:50px;

    height:26px;

    background:white;

    border-radius:50px;

    position:relative;

    cursor:pointer;
}

.toggle-dot{

    position:absolute;

    width:20px;

    height:20px;

    top:3px;

    left:3px;

    background:#22c55e;

    border-radius:50%;

    transition:.3s;

.toggle.active .toggle-dot{

}
.hero-title{

    position:absolute;

    top:95px;

@media(max-width:480px){

@keyframes titleIn{

    }

    30%{

    }

    60%{

    }

    70%{

    }

    80%{
        transform:scale(2.2) rotate(10deg);
    }

    100%{
        transform:scale(1);
    }
}

<script>

setTimeout(function(){

    document
    .getElementById("splash")
    .classList.add("hideSplash");

},3000);

const sideTab =
document.getElementById(
"sideTab"
);

const langSwitch =
document.getElementById(
"langSwitch"
);

const toggle =
document.getElementById(
"toggle"
);

sideTab.onclick = (e)=>{

    e.stopPropagation();

    langSwitch.classList.toggle(
        "show"
    );

    sideTab.classList.toggle(
        "hide"
    );

};

toggle.onclick = (e)=>{

    e.stopPropagation();

    toggle.classList.toggle(
        "active"
    );

};

document.addEventListener(
"click",
function(e){

    if(
        !langSwitch.contains(
            e.target
        ) &&
        !sideTab.contains(
            e.target
        )
    ){

        langSwitch.classList.remove(

        );

    }

});

const bell =
document.getElementById(
"bell"
);

bell.onclick = ()=>{

    bell.classList.remove(
        "animate"
    );

    void bell.offsetWidth;

    bell.classList.add(
        "animate"
    );

    /* LOUD BELL SOUND */

    const audioCtx =
    new (
        window.AudioContext ||
        window.webkitAudioContext
    )();

    const osc =
    audioCtx.createOscillator();

    const gain =
    audioCtx.createGain();

    osc.connect(gain);

    gain.connect(
        audioCtx.destination
    );

    osc.type = "triangle";

    osc.frequency.setValueAtTime(
        1800,
        audioCtx.currentTime
    );

    osc.frequency.exponentialRampToValueAtTime(
        700,
        audioCtx.currentTime + 0.6
    );

    gain.gain.setValueAtTime(
        0.8,
        audioCtx.currentTime
    );

    gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + 0.6
    );

    osc.start();

    osc.stop(
        audioCtx.currentTime + 0.6
    );

    setTimeout(()=>{

        bell.classList.remove(
            "animate"
        );

    },800);

};

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let rockets = [];
let particles = [];

function drawStar(x, y, size) {


ctx.beginPath();

for (let i = 0; i < 5; i++) {

    let outer =
        (18 + i * 72) *
        Math.PI / 180;

    let inner =
        (54 + i * 72) *
        Math.PI / 180;

    ctx.lineTo(
        x + Math.cos(outer) * size,
        y + Math.sin(outer) * size
    );

    ctx.lineTo(
        x + Math.cos(inner) * (size / 2),
        y + Math.sin(inner) * (size / 2)
    );
}

ctx.closePath();
ctx.fill();


}

/* STAR PARTICLES */

class Particle {


constructor(x, y) {

    this.x = x;
    this.y = y;

    const angle =
        Math.random() *
        Math.PI * 2;

    const speed =
        Math.random() * 4 + 1;

    this.vx =
        Math.cos(angle) * speed;

    this.vy =
        Math.sin(angle) * speed;

    this.life = 80;
}

update() {

    this.x += this.vx;
    this.y += this.vy;

    this.vy += 0.02;

    this.life--;
}

draw() {

    ctx.globalAlpha =
        this.life / 80;

    ctx.fillStyle =
        "#ffffff";

    ctx.shadowBlur = 10;
    ctx.shadowColor = "#ffffff";

    drawStar(
        this.x,
        this.y,
        3
    );

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
}


}

/* TRAIL */

class TrailParticle {


constructor(x, y) {

    this.x = x;
    this.y = y;

    this.life = 20;
}

update() {

    this.life--;
}

draw() {

    ctx.globalAlpha =
        this.life / 20;

    ctx.fillStyle =
        "#ffffff";

    drawStar(
        this.x,
        this.y,
        2
    );

    ctx.globalAlpha = 1;
}


}

/* ROCKET */

class Rocket {


constructor() {

    this.x =
        Math.random() *
        canvas.width;

    this.y =
        canvas.height + 20;

    this.targetY =
        100 +
        Math.random() * 220;

    this.speed =
        6 +
        Math.random() * 2;
}

update() {

    this.y -= this.speed;

    for (let i = 0; i < 4; i++){

        particles.push(

            new TrailParticle(

                this.x +
                (Math.random() * 6 - 3),

                this.y + 12
            )
        );
    }

    if (
        this.y <=
        this.targetY
    ) {

        explode(
            this.x,
            this.y
        );

        return false;
    }

    return true;
}

draw() {

    ctx.fillStyle =
        "#ffffff";

    ctx.shadowBlur = 15;
    ctx.shadowColor = "#ffffff";

    drawStar(
        this.x,
        this.y,
        5
    );

    ctx.shadowBlur = 0;
}


}

/* EXPLOSION */

function explode(x, y) {


for (
    let i = 0;
    i < 25;
    i++
) {

    particles.push(
        new Particle(
            x,
            y
        )
    );
}


}

/* NEW ROCKET */

setInterval(() => {


rockets.push(
    new Rocket()
);


}, 1800);

/* LOOP */

function animate() {


ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
);

rockets =
    rockets.filter(r => {

        r.draw();

        return r.update();
    });

particles =
    particles.filter(p => {

        p.draw();

        p.update();

        return p.life > 0;
    });

requestAnimationFrame(
    animate
);


}

animate();

document.getElementById(
    "notifyBtn"

        notifyBtn.classList.remove(
            "ring"
        );

        notifyBtn.classList.add(
            "ring"
        );
    }
);
</script>
